name: scoot
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: scoot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scoot
    ports:
      - "5433:5432"
    volumes:
      - ${DATA_DIR:-/tmp/scoot-data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: ri/physical/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://scoot:password@postgres:5432/scoot
      NODE_ENV: development
    ports:
      - "3000:3000"
      - "5175:5173"
    volumes:
      - ../..:/app
      - node_modules:/app/node_modules
      - ${DATA_DIR:-/tmp/scoot-data}/media:/var/scoot/media
      - ../../../scoot-chat:/app/scoot-chat
    networks:
      # default = scoot's own network (postgres lives here). memvault is the
      # Memory Vault stack's network, joined so BigMo can reach its REST API at
      # http://memory-vault-app-1:8000 (MEMORY_VAULT_URL). External: managed by
      # the separate ~/memory-vault compose project — see infra_memory_vault memory.
      - default
      - memvault

networks:
  memvault:
    external: true
    name: memory-vault_default

volumes:
  node_modules:
