name: scoot
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: scoot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scoot
    ports:
      - "5432:5432"
    volumes:
      - ${DATA_DIR:-./.data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: ri/physical/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://scoot:password@postgres:5432/scoot
      NODE_ENV: development
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ../..:/app
      - node_modules:/app/node_modules
      - ${DATA_DIR:-./.data/media}:/var/scoot/media

volumes:
  node_modules:
