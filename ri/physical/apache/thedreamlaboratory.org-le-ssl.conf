<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    ServerName thedreamlaboratory.org
    ServerAlias www.thedreamlaboratory.org

    ErrorLog ${APACHE_LOG_DIR}/thedreamlaboratory.error.log
    CustomLog ${APACHE_LOG_DIR}/thedreamlaboratory.access.log combined

    ProxyPreserveHost On
    ProxyRequests Off

    # Static legal pages — must come before any ProxyPass so they aren't forwarded
    ProxyPass        /privacy !
    ProxyPass        /terms   !
    Alias            /privacy /var/www/thedreamlaboratory.org/html/privacy.html
    Alias            /terms   /var/www/thedreamlaboratory.org/html/terms.html
    <Directory /var/www/thedreamlaboratory.org/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # WebSocket — must come before generic / forwards
    ProxyPass        /ws  ws://127.0.0.1:3000/ws
    ProxyPassReverse /ws  ws://127.0.0.1:3000/ws

    # API + media served by Express directly
    ProxyPass        /api    http://127.0.0.1:3000/api
    ProxyPassReverse /api    http://127.0.0.1:3000/api
    ProxyPass        /media  http://127.0.0.1:3000/media
    ProxyPassReverse /media  http://127.0.0.1:3000/media

    # Everything else (SPA + Vite HMR) -> Vite dev server
    ProxyPass        /  http://127.0.0.1:5175/
    ProxyPassReverse /  http://127.0.0.1:5175/

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/thedreamlaboratory.org/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/thedreamlaboratory.org/privkey.pem
</VirtualHost>
</IfModule>
